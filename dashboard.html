<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — HexaHold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* ── Dashboard Layout ── */
  body { cursor: auto; }
  .cursor, .cursor-trail { display: none; }

  .dash-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 260px;
    z-index: 50;
  }

  .sidebar-logo { margin-bottom: 48px; }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: background 0.2s, color 0.2s;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(124,92,252,0.12); color: var(--text); }
  .nav-item.active .nav-icon { color: var(--accent2); }

  .nav-icon { font-size: 17px; width: 20px; text-align: center; }

  .nav-section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 18px 14px 8px;
    font-weight: 500;
  }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(124,92,252,0.2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    color: var(--accent2);
    flex-shrink: 0;
  }

  .user-email {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .btn-signout {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .btn-signout:hover { color: #ef4444; }

  /* ── Main Content ── */
  .dash-main {
    margin-left: 260px;
    padding: 40px 48px;
    min-height: 100vh;
  }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }

  .dash-greeting {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .dash-greeting span { color: var(--accent2); }

  .dash-date {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Section Title ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-head h2 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* ── Add Wallet Button ── */
  .btn-add-wallet {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(124,92,252,0.3);
    transition: background 0.2s, transform 0.15s;
  }
  .btn-add-wallet:hover { background: var(--accent2); transform: translateY(-1px); }

  /* ── Wallets Grid ── */
  .wallets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .wallet-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .wallet-card:hover { border-color: rgba(124,92,252,0.3); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .wallet-card:hover::before { opacity: 1; }

  .wallet-flag { font-size: 28px; margin-bottom: 14px; display: block; }

  .wallet-currency {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .wallet-balance {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .wallet-balance .symbol {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    margin-right: 3px;
  }

  .wallet-name {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Empty state */
  .wallets-empty {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
  }

  .wallets-empty-icon { font-size: 40px; margin-bottom: 16px; }

  .wallets-empty h3 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .wallets-empty p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 420px;
    transform: translateY(16px);
    transition: transform 0.2s;
    position: relative;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .modal-close:hover { color: var(--text); background: var(--surface2); }

  .currency-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .currency-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .currency-option:hover { border-color: rgba(124,92,252,0.4); background: rgba(124,92,252,0.06); }
  .currency-option.selected { border-color: var(--accent); background: rgba(124,92,252,0.12); }

  .currency-option .flag { font-size: 22px; display: block; margin-bottom: 6px; }
  .currency-option .code { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--text); }
  .currency-option .name { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .btn-confirm {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(124,92,252,0.3);
    transition: background 0.2s, transform 0.15s;
  }
  .btn-confirm:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,0.3); }
  .toast.error   { border-color: rgba(239,68,68,0.3); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .dash-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .dash-main { margin-left: 0; padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Add Wallet Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 class="modal-title">Add a wallet</h2>
    <p class="modal-sub">Choose a currency to create a new wallet</p>
    <div class="currency-grid" id="currencyGrid"></div>
    <button class="btn-confirm" id="btnConfirmWallet" disabled>Add Wallet</button>
  </div>
</div>

<div class="dash-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="index.html" class="logo sidebar-logo">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="#7c5cfc" opacity="0.15"/>
        <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="#7c5cfc" stroke-width="1.5"/>
        <rect x="17" y="12" width="2.8" height="9" rx="1.4" fill="#a78bfa"/>
        <rect x="20.8" y="12" width="2.8" height="9" rx="1.4" fill="#a78bfa"/>
        <rect x="17" y="16.2" width="6.6" height="2.6" rx="1.3" fill="#a78bfa"/>
        <rect x="14.5" y="22" width="11" height="8" rx="2.5" fill="#7c5cfc"/>
        <circle cx="20" cy="25.5" r="1.4" fill="#fff" opacity="0.85"/>
      </svg>
      <span class="logo-text">Hexa<span>Hold</span></span>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item active" href="dashboard.html">
        <span class="nav-icon">▦</span> Overview
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">⇄</span> Exchange
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">↑</span> Send
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">↓</span> Receive
      </a>

      <div class="nav-section-label">Account</div>
      <a class="nav-item" href="#">
        <span class="nav-icon">⊙</span> Transactions
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">◈</span> Cards
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">⚙</span> Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-email" id="userEmail">Loading...</div>
      <button class="btn-signout" id="btnSignOut" title="Sign out">⎋</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="dash-main">
    <div class="dash-header">
      <div>
        <div class="dash-greeting">Good <span id="timeGreeting">day</span>, <span id="userName">there</span> 👋</div>
        <div class="dash-date" id="dashDate"></div>
      </div>
    </div>

    <!-- Wallets -->
    <div class="section-head">
      <h2>Your Wallets</h2>
      <button class="btn-add-wallet" id="btnAddWallet">
        + Add Currency
      </button>
    </div>

    <div class="wallets-grid" id="walletsGrid">
      <!-- Skeleton loaders -->
      <div class="skeleton-card">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;margin-bottom:14px"></div>
        <div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div>
        <div class="skeleton" style="width:120px;height:28px;margin-bottom:6px"></div>
        <div class="skeleton" style="width:80px;height:11px"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;margin-bottom:14px"></div>
        <div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div>
        <div class="skeleton" style="width:120px;height:28px;margin-bottom:6px"></div>
        <div class="skeleton" style="width:80px;height:11px"></div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/main.js"></script>
<script>
/* ============================================================
   Dashboard — inline script (will move to dashboard.js)
   ============================================================ */

const { createClient } = supabase
const SUPABASE_URL = 'YOUR_SUPABASE_URL'
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'
const client = createClient(SUPABASE_URL, SUPABASE_KEY)

/* ── Currency data ── */
const CURRENCIES = [
  { code: 'USD', name: 'US Dollar',     flag: '🇺🇸', symbol: '$' },
  { code: 'EUR', name: 'Euro',          flag: '🇪🇺', symbol: '€' },
  { code: 'GBP', name: 'British Pound', flag: '🇬🇧', symbol: '£' },
  { code: 'NGN', name: 'Naira',         flag: '🇳🇬', symbol: '₦' },
  { code: 'GHS', name: 'Cedi',          flag: '🇬🇭', symbol: '₵' },
  { code: 'KES', name: 'Shilling',      flag: '🇰🇪', symbol: 'KSh' },
  { code: 'BTC', name: 'Bitcoin',       flag: '₿',   symbol: '₿' },
  { code: 'ETH', name: 'Ethereum',      flag: '⬡',   symbol: 'Ξ' },
  { code: 'USDT',name: 'Tether',        flag: '💵',  symbol: '₮' },
]

/* ── Toast ── */
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast')
  t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg
  t.className = `toast ${type} show`
  setTimeout(() => t.classList.remove('show'), 3000)
}

/* ── Greeting ── */
function setGreeting() {
  const h = new Date().getHours()
  const g = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening'
  document.getElementById('timeGreeting').textContent = g
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  })
}

/* ── Render wallets ── */
function renderWallets(wallets) {
  const grid = document.getElementById('walletsGrid')

  if (!wallets.length) {
    grid.innerHTML = `
      <div class="wallets-empty">
        <div class="wallets-empty-icon">💳</div>
        <h3>No wallets yet</h3>
        <p>Add your first currency to get started</p>
        <button class="btn-add-wallet" onclick="openModal()">+ Add Currency</button>
      </div>`
    return
  }

  grid.innerHTML = wallets.map(w => {
    const cur = CURRENCIES.find(c => c.code === w.currency) || { flag: '💱', symbol: '', name: w.currency }
    const bal = parseFloat(w.balance).toLocaleString('en-US', {
      minimumFractionDigits: 2, maximumFractionDigits: 8
    })
    return `
      <div class="wallet-card">
        <span class="wallet-flag">${cur.flag}</span>
        <div class="wallet-currency">${w.currency}</div>
        <div class="wallet-balance"><span class="symbol">${cur.symbol}</span>${bal}</div>
        <div class="wallet-name">${cur.name}</div>
      </div>`
  }).join('')
}

/* ── Load wallets ── */
async function loadWallets() {
  const { data, error } = await client.from('wallets').select('*').order('created_at')
  if (error) { showToast('Failed to load wallets', 'error'); return }
  renderWallets(data || [])
}

/* ── Modal ── */
let selectedCurrency = null

function openModal() {
  selectedCurrency = null
  document.getElementById('btnConfirmWallet').disabled = true
  document.getElementById('modalOverlay').classList.add('open')
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open')
}

async function buildCurrencyGrid() {
  // Find which currencies user already has
  const { data } = await client.from('wallets').select('currency')
  const existing = (data || []).map(w => w.currency)

  const grid = document.getElementById('currencyGrid')
  grid.innerHTML = CURRENCIES.map(c => {
    const has = existing.includes(c.code)
    return `
      <div class="currency-option ${has ? 'selected' : ''}"
           style="${has ? 'opacity:0.4;pointer-events:none' : ''}"
           onclick="selectCurrency('${c.code}', this)">
        <span class="flag">${c.flag}</span>
        <div class="code">${c.code}</div>
        <div class="name">${c.name}</div>
      </div>`
  }).join('')
}

function selectCurrency(code, el) {
  document.querySelectorAll('.currency-option').forEach(o => o.classList.remove('selected'))
  el.classList.add('selected')
  selectedCurrency = code
  document.getElementById('btnConfirmWallet').disabled = false
}

async function confirmAddWallet() {
  if (!selectedCurrency) return
  const btn = document.getElementById('btnConfirmWallet')
  btn.textContent = 'Adding…'
  btn.disabled = true

  const { error } = await client.from('wallets').insert({
    currency: selectedCurrency,
    balance: 0
  })

  if (error) {
    showToast(error.message, 'error')
    btn.textContent = 'Add Wallet'
    btn.disabled = false
  } else {
    showToast(`${selectedCurrency} wallet added`)
    closeModal()
    loadWallets()
  }
}

/* ── Auth ── */
async function initUser() {
  const { data: { user } } = await client.auth.getUser()

  if (!user) {
    window.location.href = 'login.html'
    return
  }

  const email = user.email || ''
  const initials = email.slice(0, 2).toUpperCase()
  document.getElementById('userAvatar').textContent = initials
  document.getElementById('userEmail').textContent = email
  document.getElementById('userName').textContent = email.split('@')[0]
}

document.getElementById('btnSignOut').addEventListener('click', async () => {
  await client.auth.signOut()
  window.location.href = 'login.html'
})

document.getElementById('btnAddWallet').addEventListener('click', () => {
  buildCurrencyGrid()
  openModal()
})

document.getElementById('modalClose').addEventListener('click', closeModal)
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal()
})
document.getElementById('btnConfirmWallet').addEventListener('click', confirmAddWallet)

/* ── Init ── */
setGreeting()
initUser()
loadWallets()
</script>
</body>
</html>
