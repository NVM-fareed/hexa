<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #f0eeff; font-family: sans-serif; }

  .dash-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    width: 100%;
  }

  .sidebar {
    width: 260px;
    background: #13131f;
    border: 5px solid red;
    padding: 20px;
  }

  .dash-main {
    border: 5px solid lime;
    padding: 20px;
  }

  .nav-item {
    display: block;
    width: 100%;
    padding: 10px;
    color: #8880aa;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="dash-layout">
  <aside class="sidebar">
    <div>LOGO</div>
    <nav>
      <a class="nav-item" href="#">Overview</a>
      <a class="nav-item" href="#">Exchange</a>
      <a class="nav-item" href="#">Send</a>
    </nav>
  </aside>
  <main class="dash-main">
    <h1>Main Content</h1>
    <p>This should be beside the sidebar, not below it.</p>
  </main>
</div>

</body>
</html>
